# Drop-in for systemd-journald to bound on-disk log size.
#
# Installed to /etc/systemd/journald.conf.d/kipclip.conf by
# deploy/release/bootstrap.sh.
#
# Defaults are 10% of /var/log filesystem (capped at 4G). On the
# Hetzner box that is ~4G — fine, but leaves room for surprise during
# noisy incidents. We pin a tighter ceiling so a runaway log loop
# cannot fill /var/log without us noticing first.
#
# To inspect current usage: `journalctl --disk-usage`
# To inspect effective config: `systemd-analyze cat-config systemd/journald.conf`

[Journal]
SystemMaxUse=1G
SystemKeepFree=2G
MaxFileSec=1week
