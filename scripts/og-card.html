<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>kipclip OG card</title>
    <style>
    :root {
      --cream: #f5f1e8;
      --coral: #e66456;
      --teal: #5b8a8f;
      --dark: #1f2937;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(
        135deg,
        #e9efee 0%,
        #eef0e8 55%,
        var(--cream) 100%
      );
      color: var(--dark);
    }

    .card {
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: 480px 1fr;
      align-items: center;
      padding: 0 80px 0 60px;
      gap: 40px;
    }

    .mascot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mascot img {
      width: 420px;
      height: 420px;
      object-fit: contain;
      filter: drop-shadow(0 2px 2px rgba(20, 30, 40, 0.1))
        drop-shadow(0 22px 36px rgba(20, 30, 40, 0.14));
    }

    .copy {
      padding-right: 8px;
    }

    .wordmark {
      font-size: 92px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--coral);
      margin-bottom: 22px;
    }

    .headline {
      font-size: 58px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--dark);
      margin-bottom: 32px;
    }

    .meta {
      font-size: 26px;
      line-height: 1.2;
      color: #4b5563;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .meta .dot {
      display: inline-block;
      margin: 0 12px;
      color: #9ca3af;
    }

    .meta .accent {
      color: var(--teal);
    }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mascot">
        <img
          src="https://cdn.kipclip.com/images/kip-satchel-transparent.png"
          alt=""
        />
      </div>
      <div class="copy">
        <div class="wordmark">kipclip</div>
        <div class="headline">Bookmarks you<br />actually own.</div>
        <div class="meta">
          <span>Free</span><span class="dot">·</span>
          <span class="accent">Open source</span><span class="dot">·</span>
          <span>Hosted in the EU</span>
        </div>
      </div>
    </div>
  </body>
</html>
